name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inline Three.js for offline
        run: |
          curl -sSL -o three.min.js https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js
          node <<'EOF'
          const fs = require('fs');
          const asset = 'app/src/main/assets/index.html';
          let h = fs.readFileSync(asset, 'utf8');
          const three = fs.readFileSync('three.min.js', 'utf8');
          const re = /<script src="https:\/\/cdnjs\.cloudflare\.com\/ajax\/libs\/three\.js\/[^"]*"><\/script>/;
          if (re.test(h)) {
            h = h.replace(re, () => '<script>\n' + three + '\n</script>');
            fs.writeFileSync(asset, h);
            console.log('Three.js inlined, bytes:', three.length);
          } else {
            console.log('WARN: three.js tag not found');
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crystal-collection-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
