name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Three.js 인라인 (오프라인용)
        run: |
          curl -sSL -o three.min.js https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js
          python3 - <<'PY'
          import re
          asset = "app/src/main/assets/index.html"
          h = open(asset, encoding="utf-8").read()
          three = open("three.min.js", encoding="utf-8").read()
          pattern = r'<script src="https://cdnjs\.cloudflare\.com/ajax/libs/three\.js/[^"]*"></script>'
          if re.search(pattern, h):
              h = re.sub(pattern, "<script>\n" + three + "\n</script>", h, count=1)
              open(asset, "w", encoding="utf-8").write(h)
              print("Three.js inlined")
          else:
              print("warning: three.js tag not found")
          PY

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: Gradle wrapper 준비
        run: gradle wrapper --gradle-version 8.4 || true

      - name: 디버그 APK 빌드
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: crystal-collection-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
