/* ---- 우물 화면 터치 제스처 ----
   좌우 스와이프=이동, 아래 스와이프=바로 떨어뜨리기, 탭=회전
   (canvas에 touch-action:none 필수 — 없으면 브라우저가 세로 스와이프를 가로챔) */
(function () {
  var startX = 0, startY = 0, startT = 0;
  var lastX = 0, lastY = 0;
  var stepPx = 26;            // 좌우 한 칸에 필요한 거리
  var dropPx = 28;            // 아래로 이 만큼 쓸면 하드 드롭
  var didMove = false;
  var dropped = false;        // 이번 제스처에서 이미 떨어뜨렸나 (1회 제한)
  var active2 = false;
  var lastDropAt = 0;         // 마지막 낙하 시각 — 연타 방지 쿨다운

  function cellPx() {
    return (typeof wellCellPx === "number" && wellCellPx > 0) ? wellCellPx : 26;
  }

  // 낙하 실행 (쿨다운 통과 시에만). 한 번 쓴 게 두 번으로 쪼개져도 두 개가 안 떨어짐
  function tryDrop() {
    if (!active()) return false;
    var now = Date.now();
    if (now - lastDropAt < 260) { dropped = true; return false; }   // 너무 빠른 연속 낙하 차단
    hardDrop();
    lastDropAt = now;
    dropped = true;
    return true;
  }

  function onStart(e) {
    if (!document.getElementById("game").classList.contains("on")) return;
    if (!active()) return;
    // 이미 제스처 진행 중이면 두 번째 손가락은 무시 (연속 하드드롭 사고 방지)
    if (active2) { if (e.preventDefault) e.preventDefault(); return; }
    var t = e.touches ? e.touches[0] : e;
    startX = lastX = t.clientX;
    startY = lastY = t.clientY;
    startT = Date.now();
    didMove = false;
    dropped = false;
    active2 = true;
    stepPx = Math.max(16, cellPx() * 0.75);
    dropPx = Math.max(48, cellPx() * 1.6);   // 확실히 "쓸어내린" 경우만 발동
    e.preventDefault();
  }

  function onMove(e) {
    if (!active2 || !active()) return;
    var t = e.touches ? e.touches[0] : e;
    var dx = t.clientX - lastX;

    // 아래로 쓸기 → 즉시 하드 드롭 (제스처당 한 번)
    var downFromStart = t.clientY - startY;
    var acrossFromStart = Math.abs(t.clientX - startX);
    if (!dropped && downFromStart >= dropPx && downFromStart > acrossFromStart * 1.5) {
      if (tryDrop()) {
        didMove = true;
        lastX = t.clientX; lastY = t.clientY;
        e.preventDefault();
        return;
      }
    }

    // 좌우 이동 (아직 안 떨어뜨렸을 때만)
    if (!dropped) {
      while (Math.abs(dx) >= stepPx) {
        if (dx > 0) { move(1); dx -= stepPx; }
        else { move(-1); dx += stepPx; }
        lastX = t.clientX - dx;
        didMove = true;
      }
    }
    lastY = t.clientY;
    e.preventDefault();
  }

  function onEnd(e) {
    if (!active2) return;
    active2 = false;

    // 손 뗀 최종 좌표 (touchmove가 씹혔어도 여기서 잡힘)
    var ct = (e && e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
    var endX = ct ? ct.clientX : lastX;
    var endY = ct ? ct.clientY : lastY;

    var totalX = endX - startX;
    var totalY = endY - startY;
    var dt = Date.now() - startT;

    // 보강: 아직 안 떨어뜨렸는데 아래로 충분히 쓸었으면 여기서 떨어뜨림
    if (!dropped && totalY >= dropPx && totalY > Math.abs(totalX) * 1.5) {
      if (tryDrop()) {
        if (e && e.preventDefault) e.preventDefault();
        return;
      }
    }

    // 짧은 탭 → 회전
    if (!didMove && !dropped && dt < 300 && Math.abs(totalX) < 22 && Math.abs(totalY) < 22) {
      if (active()) tryRotate();
    }
    if (e && e.preventDefault) e.preventDefault();
  }

  var cv = wellCanvas;
  if (cv) {
    cv.addEventListener("touchstart", onStart, { passive: false });
    cv.addEventListener("touchmove", onMove, { passive: false });
    cv.addEventListener("touchend", onEnd, { passive: false });
    cv.addEventListener("touchcancel", function () { active2 = false; }, { passive: false });
  }
})();

/* ============================================================
   Candy Match — 앱 통합 (검증된 CandyCore 위에 UI/레벨/입력)
   이 블록은 메인 IIFE 안에 있어 Store / Audio2 에 접근 가능
   ============================================================ */
var CM_GEMS = [0x1E9FDC, 0x109669, 0xD63A78, 0xE8951F, 0x6B4CD6, 0x2A55D4];
var CM_HEX = CM_GEMS.map(function (v) { return "#" + v.toString(16).padStart(6, "0"); });
var CM_SHAPE = [0, 1, 0, 1, 2, 0];  // 0=원 1=라운드사각 2=마름모

// 난이도 곡선: 색이 적을수록 쉽다. 초반은 배우는 구간이라 넉넉하게.
// 한 수에 평균 3~4개가 사라지고, 목표 색은 (사라지는 것 중) 1/색상수 비율로 나오는 걸 감안해 여유롭게 잡음.
var CM_LEVELS = [
  { size: 7, colors: 4, moves: 25, goals: { 1: 10 } },                 // 1: 한 색만, 튜토리얼
  { size: 7, colors: 4, moves: 25, goals: { 1: 12, 2: 12 } },          // 2: 두 색
  { size: 7, colors: 4, moves: 24, goals: { 1: 12, 3: 12 } },          // 3: 완화 (기존 44개/16수 → 24개/24수)
  { size: 7, colors: 5, moves: 24, goals: { 2: 14, 4: 12 } },          // 4: 색 하나 늘어남
  { size: 8, colors: 5, moves: 24, goals: { 1: 14, 3: 14, 5: 12 } },   // 5: 세 색
  { size: 8, colors: 5, moves: 26, goals: { 2: 16, 4: 14, 5: 14 } },   // 6: 살짝 조임
  { size: 8, colors: 6, moves: 26, goals: { 1: 16, 3: 14 } },          // 7: 6색 진입은 목표 수를 줄여 완충
  { size: 8, colors: 6, moves: 26, goals: { 2: 16, 4: 16, 6: 14 } }    // 8
];
function cmLevelDef(n) {
  if (n <= CM_LEVELS.length) return CM_LEVELS[n - 1];
  // 이후 절차 생성: 색은 5~6으로 유지, 목표·이동을 완만히 조임
  var over = n - CM_LEVELS.length;
  var colors = 5 + (n % 2);
  var moves = Math.max(20, 27 - Math.floor(over / 2));
  var pick = [1, 2, 3, 4, 5, 6].slice(0, colors);
  for (var i = pick.length - 1; i > 0; i--) { var j = (n * 7 + i * 13) % (i + 1); var t = pick[i]; pick[i] = pick[j]; pick[j] = t; }
  var goals = {}, g = 2 + (n % 2);
  for (var k = 0; k < g; k++) goals[pick[k]] = 14 + ((n + k) % 3) * 3;
  return { size: 8, colors: colors, moves: moves, goals: goals };
}

var CM = {
  core: null, def: null, level: 1, moves: 0, score: 0,
  goals: null, progress: null, busy: false, sel: null,
  over: false, won: false, cell: 0, ox: 0, oy: 0,
  gems: null, particles: [], shake: 0, chain: 0,
  canvas: null, ctx: null, R: 7, C: 7, bound: false,
  running: false, frameQueued: false, lastT: 0, tween: null, difficulty: "normal",
  bgTheme: 0, bgmTrack: 0
};

var CM_EASE = function (t) { return 1 - Math.pow(1 - t, 3); };
var CM_BACK = function (t) { var c = 1.9; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); };

var CM_DIFF = {
  easy:   { moveMul: 1.4, label: "쉬움" },
  normal: { moveMul: 1.0, label: "보통" },
  hard:   { moveMul: 0.75, label: "어려움" }
};

function cmStart(n) {
  CM.level = n;
  CM.bgTheme = Math.floor(Math.random() * 6);   // 레벨마다 배경 무작위
  CM.bgmTrack = Math.floor(Math.random() * 6);  // BGM도 무작위
  var d = cmLevelDef(n);
  CM.def = d; CM.R = d.size; CM.C = d.size;
  CM.core = new CandyCore(d.size, d.size, d.colors, Math.random);
  CM.core.fillNew();
  var mul = (CM_DIFF[CM.difficulty] || CM_DIFF.normal).moveMul;
  CM.baseMoves = d.moves;
  CM.moves = Math.round(d.moves * mul);
  CM.score = 0;
  CM.goals = {}; CM.progress = {};
  for (var col in d.goals) { CM.goals[col] = d.goals[col]; CM.progress[col] = 0; }
  CM.busy = false; CM.sel = null; CM.over = false; CM.won = false;
  CM.particles = []; CM.shake = 0; CM.chain = 0; CM.tween = null;
  cmLayout();
  cmSyncGems(true);
  cmHud();
  cmEnsureLoop();
}

// 논리 셀 {c,sp} → 시각 보석
function cmSyncGems(reset) {
  CM.gems = [];
  for (var r = 0; r < CM.R; r++) {
    CM.gems.push([]);
    for (var c = 0; c < CM.C; c++) {
      var cell = CM.core.grid[r][c];
      var ctr = cmCenter(r, c);
      CM.gems[r].push(cell ? {
        col: cell.c, sp: cell.sp || 0, x: ctr[0], y: ctr[1],
        scale: reset ? 0 : 1, targetScale: 1,
        appear: reset ? (r * 0.02 + c * 0.012) : 0, appearT: reset ? 0 : 1
      } : null);
    }
  }
}

function cmLayout() {
  var cv = CM.canvas; if (!cv) return;
  var w = cv.clientWidth, h = cv.clientHeight;
  if (!w || !h) return;
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.round(w * dpr); cv.height = Math.round(h * dpr);
  CM.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var pad = 6;
  CM.cell = Math.floor(Math.min((w - pad * 2) / CM.C, (h - pad * 2) / CM.R));
  CM.ox = (w - CM.cell * CM.C) / 2;
  CM.oy = (h - CM.cell * CM.R) / 2;
  if (CM.gems && !CM.busy) {
    for (var r = 0; r < CM.R; r++) for (var c = 0; c < CM.C; c++) {
      var g = CM.gems[r] && CM.gems[r][c];
      if (g) { var ctr = cmCenter(r, c); g.x = ctr[0]; g.y = ctr[1]; }
    }
  }
}

function cmRoundPath(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
}

// 보석 하나 그리기. sp가 있으면 특수 표식 오버레이
function cmDrawGem(ctx, col, sp, cx, cy, s, alpha, extraGlow, infected) {
  if (!col || s <= 0.02) return;
  var hex = CM_HEX[col - 1], shape = CM_SHAPE[col - 1];
  var r = CM.cell * 0.40 * s;
  ctx.save(); ctx.translate(cx, cy);
  if (extraGlow) { ctx.globalAlpha = extraGlow * alpha; ctx.shadowColor = hex; ctx.shadowBlur = CM.cell * 0.5 * extraGlow; }

  if (sp === 'B') {
    // 컬러밤: 무지개빛 구슬
    ctx.globalAlpha = 0.95 * alpha;
    var grd = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    grd.addColorStop(0, "#ffffff");
    grd.addColorStop(0.35, hex);
    grd.addColorStop(0.7, "#6B4CD6");
    grd.addColorStop(1, "#23222A");
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.05, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = Math.max(1, CM.cell*0.05);
    ctx.stroke();
    // 반짝임
    ctx.globalAlpha = 0.8 * alpha; ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.beginPath(); ctx.arc(-r*0.3, -r*0.32, r*0.16, 0, Math.PI*2); ctx.fill();
    ctx.restore(); return;
  }

  ctx.globalAlpha = 0.85 * alpha;
  ctx.fillStyle = hex;
  ctx.strokeStyle = "rgba(255,255,255,0.9)";
  ctx.lineWidth = Math.max(1, CM.cell * 0.045);
  ctx.beginPath();
  if (shape === 0) { ctx.arc(0, 0, r, 0, Math.PI * 2); }
  else if (shape === 1) { var w = r * 1.7; cmRoundPath(ctx, -w/2, -w/2, w, w, r * 0.42); }
  else { ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath(); }
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.5 * alpha;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.42, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.85 * alpha;
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.beginPath(); ctx.arc(-r * 0.30, -r * 0.32, r * 0.18, 0, Math.PI * 2); ctx.fill();

  // 스트라이프 표식: 방향 줄무늬
  if (sp === 'H' || sp === 'V') {
    ctx.globalAlpha = 0.9 * alpha;
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = Math.max(1.5, CM.cell * 0.06);
    for (var k = -1; k <= 1; k++) {
      ctx.beginPath();
      if (sp === 'H') { ctx.moveTo(-r*0.8, k*r*0.34); ctx.lineTo(r*0.8, k*r*0.34); }
      else { ctx.moveTo(k*r*0.34, -r*0.8); ctx.lineTo(k*r*0.34, r*0.8); }
      ctx.stroke();
    }
  } else if (sp === 'W') {
    // 래핑: 이중 테두리 사각 표식
    ctx.globalAlpha = 0.9 * alpha;
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = Math.max(1.5, CM.cell * 0.05);
    ctx.strokeRect(-r*0.55, -r*0.55, r*1.1, r*1.1);
    ctx.strokeRect(-r*0.28, -r*0.28, r*0.56, r*0.56);
  }
  if (infected) {
    // 감염: 무지개 링이 회전하며 물듦
    var ph = performance.now() / 200;
    ctx.globalAlpha = 0.85 * alpha;
    ctx.lineWidth = Math.max(2, CM.cell * 0.08);
    var segs = 6;
    var cols = ["#E8951F", "#109669", "#1E9FDC", "#6B4CD6", "#D63A78", "#FAC775"];
    for (var q = 0; q < segs; q++) {
      ctx.strokeStyle = cols[q % cols.length];
      ctx.beginPath();
      var a0 = ph + q * Math.PI * 2 / segs;
      ctx.arc(0, 0, r * 1.08, a0, a0 + Math.PI * 2 / segs * 0.8);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function cmCenter(r, c) { return [CM.ox + c * CM.cell + CM.cell / 2, CM.oy + r * CM.cell + CM.cell / 2]; }

function cmDraw() {
  if (!CM.ctx || !CM.core) return;
  var ctx = CM.ctx, cv = CM.canvas;
  var w = cv.clientWidth, h = cv.clientHeight;
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  if (CM.shake > 0) { var mag = CM.shake * CM.cell * 0.16; ctx.translate((Math.random()-0.5)*mag, (Math.random()-0.5)*mag); }

  ctx.globalAlpha = 1;
  ctx.fillStyle = "rgba(223,218,207,0.9)";
  ctx.beginPath(); cmRoundPath(ctx, CM.ox - 5, CM.oy - 5, CM.cell*CM.C + 10, CM.cell*CM.R + 10, 10); ctx.fill();

  if (CM.sel) {
    var g0 = CM.gems[CM.sel[0]] && CM.gems[CM.sel[0]][CM.sel[1]];
    if (g0) {
      var pulse = 0.5 + 0.5 * Math.sin(performance.now() / 180);
      ctx.globalAlpha = 0.35 + 0.35 * pulse;
      ctx.strokeStyle = "rgba(169,128,63,0.95)";
      ctx.lineWidth = 2 + pulse;
      var pc = cmCenter(CM.sel[0], CM.sel[1]);
      ctx.beginPath();
      cmRoundPath(ctx, pc[0]-CM.cell/2+3, pc[1]-CM.cell/2+3, CM.cell-6, CM.cell-6, CM.cell*0.2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  for (var r = 0; r < CM.R; r++) for (var c = 0; c < CM.C; c++) {
    var g = CM.gems[r] && CM.gems[r][c];
    if (!g) continue;
    cmDrawGem(ctx, g.col, g.sp, g.x, g.y, g.scale, g.alpha === undefined ? 1 : g.alpha, g.glow || 0, g.infected);
  }

  for (var i = 0; i < CM.particles.length; i++) {
    var p = CM.particles[i];
    ctx.globalAlpha = Math.max(0, p.life / p.max) * 0.9;
    ctx.fillStyle = p.hex;
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    var ps = p.size * (0.4 + 0.6 * (p.life / p.max));
    ctx.fillRect(-ps/2, -ps/2, ps, ps);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function cmSpawnParticles(r, c, col, big) {
  var ctr = cmCenter(r, c);
  var hex = CM_HEX[col - 1];
  var n = big ? 10 : 6;
  for (var k = 0; k < n; k++) {
    var ang = (Math.PI * 2 * k) / n + Math.random() * 0.6;
    var sp = CM.cell * (2.2 + Math.random() * (big ? 4 : 2.4));
    CM.particles.push({
      x: ctr[0], y: ctr[1], hex: hex,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - CM.cell * 1.2,
      rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 12,
      size: CM.cell * (0.16 + Math.random() * 0.14),
      life: 0.5 + Math.random() * 0.25, max: 0.7
    });
  }
}

function cmHud() {
  document.getElementById("cm-level").textContent = CM.level;
  document.getElementById("cm-moves").textContent = CM.moves;
  document.getElementById("cm-score").textContent = CM.score.toLocaleString();
  var wrap = document.getElementById("cm-goals");
  wrap.innerHTML = "";
  for (var col in CM.goals) {
    var need = CM.goals[col], got = Math.min(CM.progress[col] || 0, need);
    var chip = document.createElement("span");
    chip.className = "cm-goal" + (got >= need ? " done" : "");
    var dot = document.createElement("canvas");
    dot.className = "cm-dot"; dot.width = 32; dot.height = 32;
    cmDrawGoalIcon(dot, parseInt(col, 10));
    var tx = document.createElement("span");
    tx.textContent = got + "/" + need;
    chip.appendChild(dot); chip.appendChild(tx);
    wrap.appendChild(chip);
  }
  var stars = cmStars();
  var sb = document.getElementById("cm-stars");
  sb.innerHTML = "";
  for (var i = 0; i < 3; i++) {
    var s = document.createElement("span");
    s.textContent = "★"; s.style.opacity = i < stars ? "1" : "0.28";
    sb.appendChild(s);
  }
}

function cmDrawGoalIcon(cv, col) {
  var ctx = cv.getContext("2d");
  ctx.clearRect(0, 0, cv.width, cv.height);
  var hex = CM_HEX[col - 1], shape = CM_SHAPE[col - 1];
  var cx = cv.width / 2, cy = cv.height / 2, r = cv.width * 0.34;
  ctx.save(); ctx.translate(cx, cy);
  ctx.globalAlpha = 0.9; ctx.fillStyle = hex;
  ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 2;
  ctx.beginPath();
  if (shape === 0) { ctx.arc(0, 0, r, 0, Math.PI * 2); }
  else if (shape === 1) { var w = r * 1.7; cmRoundPath(ctx, -w/2, -w/2, w, w, r * 0.42); }
  else { ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath(); }
  ctx.fill(); ctx.stroke();
  ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.42, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.85; ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.32, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function cmGoalsMet() {
  for (var col in CM.goals) if ((CM.progress[col] || 0) < CM.goals[col]) return false;
  return true;
}
function cmStars() {
  if (!cmGoalsMet()) return 0;
  var ratio = CM.moves / CM.baseMoves;
  if (ratio >= 0.4) return 3;
  if (ratio >= 0.15) return 2;
  return 1;
}

function cmEnsureLoop() {
  if (CM.frameQueued) return;
  CM.frameQueued = true;
  CM.running = true;
  CM.lastT = performance.now();
  requestAnimationFrame(cmFrame);
}

function cmFrame(now) {
  CM.frameQueued = false;
  if (!document.getElementById("candy").classList.contains("on")) { CM.running = false; return; }
  var dt = Math.min((now - CM.lastT) / 1000 || 0, 0.05);
  CM.lastT = now;
  var animating = false;

  for (var r = 0; r < CM.R; r++) for (var c = 0; c < CM.C; c++) {
    var g = CM.gems[r] && CM.gems[r][c];
    if (!g) continue;
    if (g.appear > 0) { g.appear -= dt; animating = true; }
    else if (g.appearT < 1) { g.appearT = Math.min(1, g.appearT + dt / 0.28); g.scale = CM_BACK(g.appearT); animating = true; }
    if (g.targetScale !== undefined && Math.abs(g.scale - g.targetScale) > 0.01 && g.appearT >= 1) {
      g.scale += (g.targetScale - g.scale) * Math.min(1, dt * 14); animating = true;
    }
  }

  if (CM.tween) {
    CM.tween.t = Math.min(1, CM.tween.t + dt / CM.tween.dur);
    var e = CM.tween.ease(CM.tween.t);
    for (var i = 0; i < CM.tween.items.length; i++) {
      var it = CM.tween.items[i];
      it.g.x = it.x0 + (it.x1 - it.x0) * e;
      it.g.y = it.y0 + (it.y1 - it.y0) * e;
    }
    animating = true;
    if (CM.tween.t >= 1) { var cb = CM.tween.done; CM.tween = null; if (cb) cb(); }
  }

  for (var pi = CM.particles.length - 1; pi >= 0; pi--) {
    var p = CM.particles[pi];
    p.life -= dt;
    if (p.life <= 0) { CM.particles.splice(pi, 1); continue; }
    p.vy += CM.cell * 9 * dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.vr * dt;
    animating = true;
  }

  if (CM.shake > 0) { CM.shake = Math.max(0, CM.shake - dt * 3.5); animating = true; }

  cmDraw();

  if (animating || CM.busy || CM.sel) { CM.frameQueued = true; requestAnimationFrame(cmFrame); }
  else CM.running = false;
}

function cmTween(items, dur, ease, done) {
  CM.tween = { items: items, t: 0, dur: dur, ease: ease, done: done };
  cmEnsureLoop();
}

// 스왑
function cmDoSwap(r1, c1, r2, c2) {
  var g1 = CM.gems[r1][c1], g2 = CM.gems[r2][c2];
  if (!g1 || !g2) { CM.busy = false; return; }
  var p1 = cmCenter(r1, c1), p2 = cmCenter(r2, c2);
  CM.busy = true;
  cmTween([
    { g: g1, x0: p1[0], y0: p1[1], x1: p2[0], y1: p2[1] },
    { g: g2, x0: p2[0], y0: p2[1], x1: p1[0], y1: p1[1] }
  ], 0.16, CM_EASE, function () {
    var a = CM.core.grid[r1][c1], b = CM.core.grid[r2][c2];
    var isCombo = (a && a.sp) && (b && b.sp) || (a && a.sp === 'B') || (b && b.sp === 'B');
    CM.core.swap(r1, c1, r2, c2);
    // 시각 gems도 교환
    CM.gems[r1][c1] = g2; CM.gems[r2][c2] = g1;

    if (isCombo) {
      var combo = CM.core.comboSwap(r1, c1, r2, c2);
      if (combo) {
        CM.moves--; CM.chain = 0;
        Audio2.rotate();
        cmHud();
        if (combo.missionClear) { cmMissionClear(); return; }
        if (combo.isInfect) cmInfect(combo);
        else cmApplyClearSet(combo.clear, combo.counts, true);
        return;
      }
    }
    // 일반 스왑 유효성
    if (CM.core.findMatchGroups().length === 0) {
      CM.core.swap(r1, c1, r2, c2);
      CM.gems[r1][c1] = g1; CM.gems[r2][c2] = g2;
      Audio2.tick();
      cmTween([
        { g: g1, x0: p2[0], y0: p2[1], x1: p1[0], y1: p1[1] },
        { g: g2, x0: p1[0], y0: p1[1], x1: p2[0], y1: p2[1] }
      ], 0.16, CM_EASE, function () { CM.busy = false; });
      return;
    }
    CM.moves--; CM.chain = 0;
    Audio2.rotate();
    cmHud();
    cmResolve([CM.core.rc(r1, c1), CM.core.rc(r2, c2)]);
  });
}

// 일반 매치 해소 (특수 생성 포함)
function cmResolve(swapCells) {
  var plan = CM.core.planClear(swapCells || null);
  if (!plan) { cmFinish(); return; }
  CM.busy = true; CM.chain++;
  if (CM.chain >= 2) CM.shake = Math.min(1, 0.3 + CM.chain * 0.15);

  // 진행/점수
  for (var col in plan.counts) CM.progress[col] = (CM.progress[col] || 0) + plan.counts[col];
  var total = 0; for (var cc in plan.counts) total += plan.counts[cc];
  CM.score += total * 30 * Math.max(1, CM.chain);
  Audio2.clear(Math.min(4, Math.floor(total / 3) + CM.chain));

  // 매치에 특수 보석이 포함되면 그 자리에서 발동시켜 clear를 확장
  // (스트라이프가 3매치로 다시 매치되면 그 줄 전체가 날아감)
  var expanded = {};
  for (var k0 in plan.clear) expanded[k0] = true;
  for (var k1 in plan.clear) {
    var rc1 = parseInt(k1, 10);
    var er = Math.floor(rc1 / CM.C), ec = rc1 % CM.C;
    var cell = CM.core.grid[er][ec];
    if (cell && cell.sp) {
      var ex = CM.core.detonate(rc1, {});
      for (var ei = 0; ei < ex.length; ei++) expanded[ex[ei]] = true;
    }
  }
  // 확장분의 색도 진행에 반영
  for (var xk in expanded) {
    if (plan.clear[xk]) continue;   // 이미 counts에 반영됨
    var xr = Math.floor(xk / CM.C), xc = xk % CM.C;
    var xcol = CM.core.colorAt(xr, xc);
    if (xcol) { CM.progress[xcol] = (CM.progress[xcol] || 0) + 1; CM.score += 30; }
  }

  // 제거 애니메이션
  var rcs = [];
  for (var k in expanded) {
    // 특수 생성 자리는 제거하지 않음 (planClear가 spawn 자리를 clear에서 제외)
    var isSpawn = false;
    for (var sp0 = 0; sp0 < plan.spawn.length; sp0++) if (plan.spawn[sp0].rc === parseInt(k, 10)) isSpawn = true;
    if (!isSpawn) rcs.push(parseInt(k, 10));
  }
  for (var i = 0; i < rcs.length; i++) {
    var rr = Math.floor(rcs[i] / CM.C), ccc = rcs[i] % CM.C;
    var g = CM.gems[rr] && CM.gems[rr][ccc];
    if (g) { g.glow = 1; g.targetScale = 0; cmSpawnParticles(rr, ccc, g.col); }
  }
  cmHud();
  cmEnsureLoop();

  setTimeout(function () {
    CM.core.clearRcs(rcs);
    // 특수 보석 생성
    for (var s = 0; s < plan.spawn.length; s++) {
      var sp = plan.spawn[s];
      var sr = Math.floor(sp.rc / CM.C), sc = sp.rc % CM.C;
      CM.core.grid[sr][sc] = { c: sp.color, sp: sp.sp };
    }
    // 시각 gems 재동기화 (특수 표식 반영)
    for (var i2 = 0; i2 < rcs.length; i2++) {
      var r2 = Math.floor(rcs[i2] / CM.C), c2 = rcs[i2] % CM.C;
      CM.gems[r2][c2] = null;
    }
    for (var s2 = 0; s2 < plan.spawn.length; s2++) {
      var sp2 = plan.spawn[s2];
      var sr2 = Math.floor(sp2.rc / CM.C), sc2 = sp2.rc % CM.C;
      var ctr = cmCenter(sr2, sc2);
      CM.gems[sr2][sc2] = { col: sp2.color, sp: sp2.sp, x: ctr[0], y: ctr[1], scale: 1, targetScale: 1, appear: 0, appearT: 1, glow: 0.6 };
    }
    cmApplyGravity();
  }, 200);
}

// 컬러밤+컬러밤 → 즉시 미션 클리어: 화면을 화려하게 쓸어버리고 승리
function cmMissionClear() {
  CM.busy = true; CM.over = true; CM.won = true;
  // 모든 돌을 무지개 파편으로 터뜨림 (연출용)
  var order = [];
  for (var r = 0; r < CM.R; r++) for (var c = 0; c < CM.C; c++) if (CM.gems[r][c]) order.push([r, c]);
  // 중심에서 퍼지는 순서로 정렬
  var cr = CM.R / 2, cc = CM.C / 2;
  order.sort(function (a, b) {
    var da = Math.hypot(a[0]-cr, a[1]-cc), db = Math.hypot(b[0]-cr, b[1]-cc);
    return da - db;
  });
  CM.shake = 1;
  for (var i = 0; i < order.length; i++) {
    (function (idx) {
      setTimeout(function () {
        var rc = order[idx];
        var g = CM.gems[rc[0]] && CM.gems[rc[0]][rc[1]];
        if (g) { g.glow = 1; g.targetScale = 0; cmSpawnParticles(rc[0], rc[1], g.col, true); }
        Audio2.clear(2);
        cmEnsureLoop();
      }, idx * 22);
    })(i);
  }
  // 목표를 강제 충족시켜 별 3개로 승리
  for (var col in CM.goals) CM.progress[col] = CM.goals[col];
  setTimeout(function () {
    Audio2.levelUp();
    // 별 3개 보장을 위해 이동을 그대로 두고 승리 처리
    var st = Store.data.candy || (Store.data.candy = { cleared: 0, stars: {} });
    if (CM.level > st.cleared) st.cleared = CM.level;
    if (!st.stars[CM.level] || 3 > st.stars[CM.level]) st.stars[CM.level] = 3;
    Store.save();
    if (window.showCMResult) window.showCMResult(true, 3);
  }, order.length * 22 + 400);
}

// 컬러밤 감염: 대상 색 돌들을 하나씩 물들인 뒤 순차 폭발
function cmInfect(combo) {
  CM.busy = true;
  var targets = combo.infect;       // 무작위 순서 rc 목록
  var bombRc = combo.bombRc;
  var br = Math.floor(bombRc / CM.C), bc = bombRc % CM.C;
  var infectColor = combo.color;

  // 진행/점수
  var n = targets.length + 1;
  CM.progress[infectColor] = (CM.progress[infectColor] || 0) + targets.length;
  CM.score += n * 50;
  CM.shake = Math.min(1, 0.4 + n * 0.02);

  // 감염 웨이브: 각 대상에 감염 파티클을 시차로 발사하고, infected 표시
  var wave = 0.55;                  // 감염 전체 확산 시간
  var perDelay = targets.length ? wave / targets.length : 0;
  var bombGem = CM.gems[br] && CM.gems[br][bc];
  if (bombGem) bombGem.glow = 1;

  for (var i = 0; i < targets.length; i++) {
    (function (idx) {
      setTimeout(function () {
        var rc = targets[idx];
        var r = Math.floor(rc / CM.C), c = rc % CM.C;
        var g = CM.gems[r] && CM.gems[r][c];
        if (g) {
          g.infected = true;        // 감염 표시
          g.glow = 0.9;
          if (combo.lightning) cmLightningBeam(br, bc, r, c, infectColor);
          else cmInfectBeam(br, bc, r, c, infectColor);
          Audio2.tick();
        }
        cmEnsureLoop();
      }, idx * perDelay * 1000);
    })(i);
  }

  // 확산 끝난 뒤 순차 폭발
  setTimeout(function () {
    var order = targets.slice();
    var popDelay = 0.28;
    for (var j = 0; j < order.length; j++) {
      (function (idx) {
        setTimeout(function () {
          var rc = order[idx];
          var r = Math.floor(rc / CM.C), c = rc % CM.C;
          var g = CM.gems[r] && CM.gems[r][c];
          if (g) { g.glow = 1; g.targetScale = 0; cmSpawnParticles(r, c, g.col, true); }
          Audio2.clear(2);
          cmEnsureLoop();
        }, idx * (popDelay / Math.max(1, order.length)) * 1000 + 60);
      })(j);
    }
    // 밤 자신도 터뜨리고, 논리 제거 + 낙하
    setTimeout(function () {
      var bg = CM.gems[br] && CM.gems[br][bc];
      if (bg) { bg.glow = 1; bg.targetScale = 0; cmSpawnParticles(br, bc, bg.col, true); }
      Audio2.clear(3);
      setTimeout(function () {
        var all = targets.concat([bombRc]);
        CM.core.clearRcs(all);
        for (var k = 0; k < all.length; k++) { var rr = Math.floor(all[k]/CM.C), cc = all[k]%CM.C; CM.gems[rr][cc] = null; }
        cmApplyGravity();
      }, 220);
    }, popDelay * 1000 + 120);
  }, wave * 1000 + 120);

  cmHud();
  cmEnsureLoop();
}

// 번개 감염: 지그재그 흰-노랑 번개가 대상으로 내리꽂힘
function cmLightningBeam(r0, c0, r1, c1, color) {
  var a = cmCenter(r0, c0), b = cmCenter(r1, c1);
  var steps = 8;
  for (var s = 0; s <= steps; s++) {
    var tt = s / steps;
    var jitter = (s > 0 && s < steps) ? (Math.random() - 0.5) * CM.cell * 0.6 : 0;
    CM.particles.push({
      x: a[0] + (b[0] - a[0]) * tt + jitter,
      y: a[1] + (b[1] - a[1]) * tt + jitter,
      hex: s % 2 ? "#FAC775" : "#ffffff",
      vx: (Math.random() - 0.5) * CM.cell * 1.5,
      vy: (Math.random() - 0.5) * CM.cell * 1.5,
      rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 14,
      size: CM.cell * (0.09 + Math.random() * 0.10),
      life: 0.3, max: 0.4
    });
  }
}

// 만능돌에서 대상으로 뻗는 빛줄기 파티클
function cmInfectBeam(r0, c0, r1, c1, color) {
  var a = cmCenter(r0, c0), b = cmCenter(r1, c1);
  var hex = CM_HEX[color - 1];
  var steps = 5;
  for (var s = 0; s <= steps; s++) {
    var tt = s / steps;
    CM.particles.push({
      x: a[0] + (b[0] - a[0]) * tt,
      y: a[1] + (b[1] - a[1]) * tt,
      hex: s % 2 ? "#ffffff" : hex,
      vx: (Math.random() - 0.5) * CM.cell,
      vy: (Math.random() - 0.5) * CM.cell,
      rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 8,
      size: CM.cell * (0.10 + Math.random() * 0.08),
      life: 0.35, max: 0.5
    });
  }
}

// 특수 보석 발동으로 나온 clear 집합 처리 (조합/단독 폭발)
function cmApplyClearSet(clearMap, counts, isCombo) {
  CM.busy = true;
  // 발동 전에 특수 보석들을 detonate로 확장
  var expanded = {};
  for (var k in clearMap) expanded[k] = true;
  // 각 특수 보석 위치를 detonate
  for (var k2 in clearMap) {
    var rc = parseInt(k2, 10);
    var r = Math.floor(rc / CM.C), c = rc % CM.C;
    var cell = CM.core.grid[r][c];
    if (cell && cell.sp) {
      var extra = CM.core.detonate(rc, {});
      for (var e = 0; e < extra.length; e++) expanded[extra[e]] = true;
    }
  }
  var rcs = [];
  var cnt = {};
  for (var k3 in expanded) {
    rcs.push(parseInt(k3, 10));
    var r3 = Math.floor(k3 / CM.C), c3 = k3 % CM.C;
    var col = CM.core.colorAt(r3, c3);
    if (col) cnt[col] = (cnt[col] || 0) + 1;
  }
  for (var col2 in cnt) CM.progress[col2] = (CM.progress[col2] || 0) + cnt[col2];
  CM.score += rcs.length * 40;
  CM.shake = Math.min(1, 0.5 + rcs.length * 0.02);
  Audio2.clear(4);

  for (var i = 0; i < rcs.length; i++) {
    var rr = Math.floor(rcs[i] / CM.C), ccc = rcs[i] % CM.C;
    var g = CM.gems[rr] && CM.gems[rr][ccc];
    if (g) { g.glow = 1; g.targetScale = 0; cmSpawnParticles(rr, ccc, g.col, true); }
  }
  cmHud(); cmEnsureLoop();
  setTimeout(function () {
    CM.core.clearRcs(rcs);
    for (var i2 = 0; i2 < rcs.length; i2++) { var r2 = Math.floor(rcs[i2]/CM.C), c2 = rcs[i2]%CM.C; CM.gems[r2][c2] = null; }
    cmApplyGravity();
  }, 220);
}

function cmApplyGravity() {
  var beforeCols = [];
  for (var c = 0; c < CM.C; c++) {
    var colGems = [];
    for (var r = CM.R - 1; r >= 0; r--) if (CM.gems[r][c]) colGems.push(CM.gems[r][c]);
    beforeCols.push(colGems);
  }
  CM.core.collapse();

  var items = [], newGems = [];
  for (var r2 = 0; r2 < CM.R; r2++) { newGems.push([]); for (var c2 = 0; c2 < CM.C; c2++) newGems[r2].push(null); }

  for (var c3 = 0; c3 < CM.C; c3++) {
    var survivors = beforeCols[c3]; var si = 0;
    for (var r3 = CM.R - 1; r3 >= 0; r3--) {
      var cell = CM.core.grid[r3][c3];
      if (!cell) continue;
      var ctr = cmCenter(r3, c3);
      var g;
      if (si < survivors.length) { g = survivors[si++]; items.push({ g: g, x0: g.x, y0: g.y, x1: ctr[0], y1: ctr[1] }); }
      else { g = { col: cell.c, sp: cell.sp || 0, x: ctr[0], y: CM.oy - CM.cell * (1 + (si - survivors.length)), scale: 1, targetScale: 1, appear: 0, appearT: 1 }; items.push({ g: g, x0: g.x, y0: g.y, x1: ctr[0], y1: ctr[1] }); si++; }
      g.col = cell.c; g.sp = cell.sp || 0; g.glow = 0; g.targetScale = 1; g.scale = g.scale || 1; g.appearT = 1;
      newGems[r3][c3] = g;
    }
  }
  CM.gems = newGems;

  if (!items.length) { cmResolve(null); return; }
  cmTween(items, 0.26, CM_EASE, function () { Audio2.land(); setTimeout(function () { cmResolve(null); }, 30); });
}

function cmFinish() {
  CM.busy = false; CM.chain = 0;
  cmHud();
  if (cmGoalsMet()) { cmWin(); return; }
  if (CM.moves <= 0) { cmLose(); return; }
  if (!CM.core.hasMove()) { CM.core.reshuffle(); cmSyncGems(true); cmEnsureLoop(); }
}

function cmTrySwap(r1, c1, r2, c2) {
  if (CM.busy || CM.over) return;
  if (!CM.core.adjacent(r1, c1, r2, c2)) { CM.sel = null; return; }
  CM.sel = null;
  cmDoSwap(r1, c1, r2, c2);
}

function cmWin() {
  CM.over = true; CM.won = true;
  var stars = cmStars();
  var st = Store.data.candy || (Store.data.candy = { cleared: 0, stars: {} });
  if (CM.level > st.cleared) st.cleared = CM.level;
  if (!st.stars[CM.level] || stars > st.stars[CM.level]) st.stars[CM.level] = stars;
  Store.save();
  Audio2.levelUp();
  window.showCMResult(true, stars);
}
function cmLose() {
  CM.over = true; CM.won = false;
  Audio2.over();
  window.showCMResult(false, 0);
}

function cmBind() {
  if (CM.bound) return;
  CM.bound = true;
  var cv = CM.canvas, down = null;
  function cellAt(cx, cy) {
    var rect = cv.getBoundingClientRect();
    var x = cx - rect.left - CM.ox, y = cy - rect.top - CM.oy;
    var c = Math.floor(x / CM.cell), r = Math.floor(y / CM.cell);
    if (r < 0 || r >= CM.R || c < 0 || c >= CM.C) return null;
    return [r, c];
  }
  function onDown(e) {
    if (CM.busy || CM.over) return;
    var p = e.touches ? e.touches[0] : e;
    down = cellAt(p.clientX, p.clientY);
    if (down) { CM.sel = down; cmEnsureLoop(); }
  }
  function onMove(e) {
    if (!down || CM.busy || CM.over) return;
    var p = e.touches ? e.touches[0] : e;
    var cur = cellAt(p.clientX, p.clientY);
    if (cur && (cur[0] !== down[0] || cur[1] !== down[1]) && CM.core.adjacent(down[0], down[1], cur[0], cur[1])) {
      var d = down; down = null;
      cmTrySwap(d[0], d[1], cur[0], cur[1]);
      e.preventDefault();
    }
  }
  function onUp() { down = null; }
  cv.addEventListener("mousedown", onDown);
  cv.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  cv.addEventListener("touchstart", onDown, { passive: false });
  cv.addEventListener("touchmove", onMove, { passive: false });
  cv.addEventListener("touchend", onUp);
  cv.addEventListener("click", function (e) {
    if (CM.busy || CM.over) return;
    var cell = cellAt(e.clientX, e.clientY);
    if (!cell) return;
    if (!CM.sel) { CM.sel = cell; cmEnsureLoop(); return; }
    if (CM.sel[0] === cell[0] && CM.sel[1] === cell[1]) { CM.sel = null; cmEnsureLoop(); return; }
    if (CM.core.adjacent(CM.sel[0], CM.sel[1], cell[0], cell[1])) cmTrySwap(CM.sel[0], CM.sel[1], cell[0], cell[1]);
    else { CM.sel = cell; cmEnsureLoop(); }
  });
}

// 전역 진입점
window.CandyMatch = {
  open: function (level) {
    if (!CM.canvas) {
      CM.canvas = document.getElementById("cm-board");
      CM.ctx = CM.canvas.getContext("2d");
      cmBind();
      window.addEventListener("resize", function () {
        if (document.getElementById("candy").classList.contains("on")) { cmLayout(); cmEnsureLoop(); }
      });
    }
    var st = Store.data.candy || (Store.data.candy = { cleared: 0, stars: {} });
    CM.difficulty = Store.data.difficulty || "normal";
    cmStart(level || Math.min(st.cleared + 1, CM_LEVELS.length + 20));
    // 화면 전환이 끝나 캔버스에 실제 크기가 생길 때까지 몇 프레임 재시도
    var tries = 0;
    (function ensureLaid() {
      cmLayout();
      if (CM.cell > 0) { cmSyncGems(false); cmDraw(); cmEnsureLoop(); }
      else if (tries++ < 30) { requestAnimationFrame(ensureLaid); }
    })();
  },
  restart: function () { cmStart(CM.level); },
  nextLevel: function () { cmStart(CM.level + 1); },
  openSelect: function () { openCandySelect(); }
};

// 레벨 선택 화면: 클리어한 다음 레벨까지 열림, 그 이후는 잠김
var CANDY_LEVEL_COUNT = 24;   // 선택지에 보여줄 레벨 수 (프리셋 8 + 절차생성 여유)
function openCandySelect() {
  var st = Store.data.candy || (Store.data.candy = { cleared: 0, stars: {} });
  var unlocked = (st.cleared || 0) + 1;    // 도전 가능한 최고 레벨
  var grid = document.getElementById("cs-grid");
  grid.innerHTML = "";
  var badge = document.getElementById("cs-diff-badge");
  var d = CM_DIFF[Store.data.difficulty] || CM_DIFF.normal;
  badge.textContent = "난이도 " + d.label;

  for (var n = 1; n <= CANDY_LEVEL_COUNT; n++) {
    (function (lv) {
      var locked = lv > unlocked;
      var cell = document.createElement("button");
      cell.className = "cs-cell" + (locked ? " locked" : "");
      var num = document.createElement("div");
      num.className = "cs-num"; num.textContent = lv;
      cell.appendChild(num);
      if (locked) {
        var lk = document.createElement("div");
        lk.className = "cs-lock"; lk.textContent = "🔒";
        cell.appendChild(lk);
      } else {
        var earned = (st.stars && st.stars[lv]) || 0;
        var sr = document.createElement("div");
        sr.className = "cs-stars-row";
        sr.textContent = earned > 0 ? "★★★".slice(0, earned) + "☆☆☆".slice(0, 3 - earned) : "· · ·";
        cell.appendChild(sr);
        cell.addEventListener("click", function () {
          Audio2.init(); Audio2.resume();
          showScreen("candy");
          window.CandyMatch.open(lv);   // 캔버스 초기화 포함 (CM.bgmTrack 설정됨)
          Audio2.startMusic("candy", CM.bgmTrack);
        });
      }
      if (lv === unlocked && !locked) cell.classList.add("current");
      grid.appendChild(cell);
    })(n);
  }
  showScreen("candy-select");
}

// ---- 캔디 매치 결과 오버레이 ----
var cmOv = document.getElementById("cm-ov");
window.showCMResult = function (won, stars) {
  document.getElementById("cm-ov-title").textContent = won ? "레벨 완료!" : "이동을 다 썼어요";
  document.getElementById("cm-ov-stars").textContent = won ? "★★★☆☆☆".slice(3 - stars, 6 - stars) : "☆☆☆";
  document.getElementById("cm-ov-text").textContent = won
    ? (stars === 3 ? "완벽합니다." : stars === 2 ? "잘했어요." : "목표 달성!")
    : "다시 도전해 보세요.";
  var mainBtn = document.getElementById("cm-ov-main");
  mainBtn.textContent = won ? "다음 레벨" : "다시 하기";
  mainBtn.dataset.win = won ? "1" : "0";
  cmOv.classList.add("on");
  updateCandyRecords();
};
document.getElementById("cm-ov-main").addEventListener("click", function () {
  cmOv.classList.remove("on");
  if (this.dataset.win === "1") window.CandyMatch.nextLevel();
  else window.CandyMatch.restart();
});
document.getElementById("cm-ov-sub").addEventListener("click", function () {
  cmOv.classList.remove("on");
  openCandySelect();
  updateCandyRecords();
});
document.getElementById("cm-to-hub").addEventListener("click", function () {
  cmOv.classList.remove("on");
  openCandySelect();
  updateCandyRecords();
});
document.getElementById("tile-candy").addEventListener("click", function () {
  Audio2.init(); Audio2.resume();
  openCandySelect();
  updateCandyRecords();
});
// 레벨 선택 → 컬렉션
document.getElementById("cs-to-hub").addEventListener("click", function () {
  Audio2.stopMusic(0.6);
  showScreen("hub");
  updateCandyRecords();
});
document.getElementById("cs-diff-badge").addEventListener("click", function () {
  var order = ["easy", "normal", "hard"];
  var i = order.indexOf(Store.data.difficulty);
  Store.data.difficulty = order[(i + 1) % order.length];
  CM.difficulty = Store.data.difficulty;
  Store.save();
  Audio2.init(); Audio2.resume(); Audio2.tick();
  openCandySelect();   // 배지·그리드 갱신
  if (typeof syncDiff === "function") syncDiff();
});
function updateCandyRecords() {
  var st = Store.data.candy || { cleared: 0, stars: {} };
  var total = 0;
  for (var k in st.stars) total += st.stars[k];
  var ce = document.getElementById("cm-cleared");
  var te = document.getElementById("cm-totalstars");
  if (ce) ce.textContent = st.cleared || 0;
  if (te) te.textContent = total;
}
updateCandyRecords();

var soundBtn = document.getElementById("sound-toggle");
function syncSound() { soundBtn.textContent = Store.data.sound ? "소리 켜짐" : "소리 꺼짐"; }
soundBtn.addEventListener("click", function () {
  Store.data.sound = !Store.data.sound;
  Store.save();
  syncSound();
  Audio2.init();
  Audio2.resume();
  if (Store.data.sound) {
    Audio2.bell(1046, 0.6, 0.07, 0.4);
    if (Audio2.music.on && Audio2.ready) {
      Audio2.musicBus.gain.setTargetAtTime(0.34, Audio2.ctx.currentTime, 0.4);
    }
  } else if (Audio2.ready) {
    Audio2.musicBus.gain.setTargetAtTime(0.0001, Audio2.ctx.currentTime, 0.3);
  }
});
document.getElementById("reset-records").addEventListener("click", function () {
  Store.clear();
  updateHubRecords();
  updateCandyRecords();
});

document.addEventListener("visibilitychange", function () {
  if (document.hidden && active()) pause();
});

var CM_DIFF_ORDER = ["easy", "normal", "hard"];
var diffBtn = document.getElementById("candy-diff");
function syncDiff() {
  var d = CM_DIFF[Store.data.difficulty] || CM_DIFF.normal;
  diffBtn.textContent = "캔디 난이도: " + d.label;
}
diffBtn.addEventListener("click", function () {
  var i = CM_DIFF_ORDER.indexOf(Store.data.difficulty);
  Store.data.difficulty = CM_DIFF_ORDER[(i + 1) % CM_DIFF_ORDER.length];
  CM.difficulty = Store.data.difficulty;
  Store.save();
  syncDiff();
  Audio2.init(); Audio2.resume(); Audio2.tick();
});
syncDiff();

var speedBtn = document.getElementById("speed-toggle");
function syncSpeed() {
  var s = SPEEDS[Store.data.speed] || SPEEDS.normal;
  speedBtn.textContent = "이동 속도: " + s.label;
}
speedBtn.addEventListener("click", function () {
  var i = SPEED_ORDER.indexOf(Store.data.speed);
  Store.data.speed = SPEED_ORDER[(i + 1) % SPEED_ORDER.length];
  applySpeed();
  Store.save();
  syncSpeed();
  Audio2.init(); Audio2.resume(); Audio2.tick();
});

syncSound();
syncSpeed();
updateHubRecords();

})();
</script>
