apply plugin: 'com.android.application'

android {
    namespace 'com.crystal.collection'
    compileSdk 34

    defaultConfig {
        applicationId "com.crystal.collection"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // 서명 없이 unsigned APK 생성 (CI에서 debug 서명으로 설치 가능)
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
